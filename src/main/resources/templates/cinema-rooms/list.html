<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Cinema Rooms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Cinema Rooms</h2>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/cinema-rooms/new}" class="btn btn-success">Add new</a>
    </div>

    <table class="table table-striped table-hover table-bordered">
        <thead class="table-dark">
        <tr>
            <th>
                <a class="text-white text-decoration-none" th:href="@{'/cinema-rooms/page/' + ${currentPage} + '?sortField=id&sortDir=' + ${reverseSortDir}}">
                    ID
                </a>
            </th>
            <th>
                <a class="text-white text-decoration-none" th:href="@{'/cinema-rooms/page/' + ${currentPage} + '?sortField=roomCode&sortDir=' + ${reverseSortDir}}">
                    Room Code
                </a>
            </th>
            <th>
                <a class="text-white text-decoration-none" th:href="@{'/cinema-rooms/page/' + ${currentPage} + '?sortField=capacity&sortDir=' + ${reverseSortDir}}">
                    Room Capacity
                </a>
            </th>
            <th>
                <a class="text-white text-decoration-none" th:href="@{'/cinema-rooms/page/' + ${currentPage} + '?sortField=is3D&sortDir=' + ${reverseSortDir}}">
                    Is 3D
                </a>
            </th>
            <th sec:authorize="hasRole('ADMIN')">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cinemaRoom : ${cinemaRooms}">
            <td th:text="${cinemaRoom.id}">1</td>
            <td th:text="${cinemaRoom.roomCode}">A27</td>
            <td th:text="${cinemaRoom.capacity}">100</td>
            <td th:text="${cinemaRoom.is3D}">1</td>
            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/cinema-rooms/edit/{id}(id=${cinemaRoom.id})}" class="btn btn-primary btn-sm">Edit</a>
                <a th:href="@{/cinema-rooms/delete/{id}(id=${cinemaRoom.id})}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this cinema room?');">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-4">
        <div>
            Total Cinema Rooms: <span class="fw-bold" th:text="${totalItems}"></span>
        </div>

        <nav aria-label="Page navigation">
            <ul class="pagination mb-0">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{'/cinema-rooms/page/' + ${currentPage - 1} + '?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">Back</a>
                </li>

                <li class="page-item" th:each="i: ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'">
                    <a class="page-link" th:href="@{'/cinema-rooms/page/' + ${i} + '?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">[[${i}]]</a>
                </li>

                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{'/cinema-rooms/page/' + ${currentPage + 1} + '?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">Forward</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
</body>
</html>
