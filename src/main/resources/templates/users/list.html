<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Users</h2>
<!--        <a th:href="@{/users/new}" class="btn btn-success">Add new</a>-->
    </div>

    <table class="table table-striped table-hover table-bordered">
        <thead class="table-dark">
        <tr>
            <th>
                <a class="text-white text-decoration-none" th:href="@{'/users/page/' + ${currentPage} + '?sortField=id&sortDir=' + ${reverseSortDir}}">
                    ID
                </a>
            </th>
            <th>
                <a class="text-white text-decoration-none" th:href="@{'/users/page/' + ${currentPage} + '?sortField=username&sortDir=' + ${reverseSortDir}}">
                    Username
                </a>
            </th>
            <th>
                <a class="text-white text-decoration-none" th:href="@{'/users/page/' + ${currentPage} + '?sortField=email&sortDir=' + ${reverseSortDir}}">
                    Email
                </a>
            </th>

            <th>
                <a class="text-white text-decoration-none" th:href="@{'/users/page/' + ${currentPage} + '?sortField=userDetails.firstName&sortDir=' + ${reverseSortDir}}">
                    Full Name
                </a>
            </th>
            <th>
                <a class="text-white text-decoration-none" th:href="@{'/users/page/' + ${currentPage} + '?sortField=userDetails.phoneNumber&sortDir=' + ${reverseSortDir}}">
                    Phone Number
                </a>
            </th>
            <th>
                <a class="text-white text-decoration-none" th:href="@{'/users/page/' + ${currentPage} + '?sortField=userDetails.address&sortDir=' + ${reverseSortDir}}">
                    Address
                </a>
            </th>

            <th sec:authorize="hasRole('ADMIN')">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}">1</td>
            <td th:text="${user.username}">john.doe</td>
            <td th:text="${user.email}">john.doe@email.com</td>
            <td th:text="${user.userDetails != null ? user.userDetails.firstName + ' ' + user.userDetails.lastName : '-'}">John Doe</td>
            <td th:text="${user.userDetails?.phoneNumber ?: '-'}">0733444555</td>
            <td th:text="${user.userDetails?.address ?: '-'}">Str. Unirii, nr. 42</td>

            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-primary btn-sm">Edit</a>
                <a th:href="@{/users/delete/{id}(id=${user.id})}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this user?');">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-4">
        <div>
            Total Users: <span class="fw-bold" th:text="${totalItems}"></span>
        </div>

        <nav aria-label="Page navigation">
            <ul class="pagination mb-0">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{'/users/page/' + ${currentPage - 1} + '?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">Back</a>
                </li>

                <li class="page-item" th:each="i: ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'">
                    <a class="page-link" th:href="@{'/users/page/' + ${i} + '?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">[[${i}]]</a>
                </li>

                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{'/users/page/' + ${currentPage + 1} + '?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">Forward</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
</body>
</html>
