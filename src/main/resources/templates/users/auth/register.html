<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Register</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/register}" th:object="${user}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Username *</label>
                            <input type="text" class="form-control" th:field="*{username}" required>
                            <p class="text-danger mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email *</label>
                            <input type="text" class="form-control" th:field="*{email}" required>
                            <p class="text-danger mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password *</label>
                            <input type="password" class="form-control" th:field="*{password}" required>
                            <p class="text-danger mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label d-block">Role *</label>
                            <div class="form-check form-check-inline" th:each="role : ${allRoles}">
                                <input class="form-check-input" type="radio" th:field="*{roles}" th:value="${role.id}" required>
                                <label class="form-check-label" th:text="${role.name}"></label>
                            </div>
                            <p class="text-danger mt-1" th:if="${#fields.hasErrors('roles')}" th:errors="*{roles}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">First Name *</label>
                            <input type="text" class="form-control" th:field="*{userDetails.firstName}" required>
                            <p class="text-danger mt-1" th:if="${#fields.hasErrors('userDetails.firstName')}" th:errors="*{userDetails.firstName}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Last Name *</label>
                            <input type="text" class="form-control" th:field="*{userDetails.lastName}" required>
                            <p class="text-danger mt-1" th:if="${#fields.hasErrors('userDetails.lastName')}" th:errors="*{userDetails.lastName}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="text" class="form-control" th:field="*{userDetails.phoneNumber}">
                            <p class="text-danger mt-1" th:if="${#fields.hasErrors('userDetails.phoneNumber')}" th:errors="*{userDetails.phoneNumber}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <input type="text" class="form-control" th:field="*{userDetails.address}">
                            <p class="text-danger mt-1" th:if="${#fields.hasErrors('userDetails.address')}" th:errors="*{userDetails.address}"></p>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success btn-lg">Register</button>
                        </div>

                        <div class="text-center mt-3 border-top pt-3">
                            <p class="mb-0">Already have an account?
                                <a th:href="@{/login}" class="text-success text-decoration-none fw-bold">Login here</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
