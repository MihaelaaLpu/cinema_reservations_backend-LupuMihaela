<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Cinema Schedule</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Cinema Schedule</h2>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/screenings/new}" class="btn btn-success">Add Screening</a>
    </div>

    <table class="table table-striped table-hover table-bordered">
        <thead class="table-dark">
        <tr>
            <th>
                <a class="text-white text-decoration-none" th:href="@{'/screenings/page/' + ${currentPage} + '?sortField=id&sortDir=' + ${reverseSortDir}}">
                    ID
                </a>
            </th>
            <th>
                <a class="text-white text-decoration-none" th:href="@{'/screenings/page/' + ${currentPage} + '?sortField=startTime&sortDir=' + ${reverseSortDir}}">
                    Start Time
                </a>
            </th>
            <th>
                <span class="text-white">End Time</span>
            </th>
            <th>
                <a class="text-white text-decoration-none" th:href="@{'/screenings/page/' + ${currentPage} + '?sortField=movie.title&sortDir=' + ${reverseSortDir}}">
                    Movie
                </a>
            </th>
            <th>
                <a class="text-white text-decoration-none" th:href="@{'/screenings/page/' + ${currentPage} + '?sortField=cinemaRoom.roomCode&sortDir=' + ${reverseSortDir}}">
                    Cinema Room
                </a>
            </th>
            <th sec:authorize="hasRole('ADMIN')">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="screening : ${screenings}">
            <td th:text="${screening.id}">1</td>

            <td th:text="${#temporals.format(screening.startTime, 'dd-MM-yyyy HH:mm')}">01-01-2026 14:00</td>

            <td th:text="${#temporals.format(screening.endTime, 'dd-MM-yyyy HH:mm')}">01-01-2026 16:30</td>

            <td th:text="${screening.movie.title}">Inception</td>
            <td th:text="${screening.cinemaRoom.roomCode}">A01</td>

            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/screenings/edit/{id}(id=${screening.id})}" class="btn btn-primary btn-sm">Edit</a>
                <a th:href="@{/screenings/delete/{id}(id=${screening.id})}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this screening?');">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-4">
        <div>
            Total Screenings: <span class="fw-bold" th:text="${totalItems}"></span>
        </div>

        <nav aria-label="Page navigation">
            <ul class="pagination mb-0">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{'/screenings/page/' + ${currentPage - 1} + '?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">Back</a>
                </li>

                <li class="page-item" th:each="i: ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'">
                    <a class="page-link" th:href="@{'/screenings/page/' + ${i} + '?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">[[${i}]]</a>
                </li>

                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{'/screenings/page/' + ${currentPage + 1} + '?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">Forward</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
</body>
</html>
