<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="d-flex align-items-center justify-content-center" style="min-height: 75vh;">
    <div class="text-center p-5 bg-white shadow-sm rounded-4 border">

        <h1 class="display-1 fw-bold text-danger">404</h1>
        <h2 class="h3 mb-3 text-dark">Oops! Page not found.</h2>

        <p class="text-muted mb-4">
            The page or item you are looking for does not exist or has been removed.
        </p>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
