<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Movie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Edit Movie</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/movies/{id}(id=${movie.id})}" th:object="${movie}" method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" th:field="*{title}" required>
                            <p class="text-danger mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Studio</label>
                            <input type="text" class="form-control" th:field="*{studio}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Duration (min)</label>
                            <input type="number" class="form-control" th:field="*{duration}" required min="1">
                            <p class="text-danger mt-1" th:if="${#fields.hasErrors('duration')}" th:errors="*{duration}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Rating (1-10)</label>
                            <input type="number" step="0.1" class="form-control" th:field="*{rating}" min="1" max="10">
                            <p class="text-danger mt-1" th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}"></p>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/movies}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
