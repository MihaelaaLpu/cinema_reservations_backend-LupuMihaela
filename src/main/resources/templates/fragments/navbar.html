<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="navbar">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/movies}">Cinema Reservations</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/movies}">Movies</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/cinema-rooms}">Rooms</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/screenings}">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/tickets}">Tickets</a></li>

                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/users}">Users</a>
                    </li>
                </ul>
                <ul class="navbar-nav">

                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/login}">Login</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/register}">Register</a>
                    </li>

                    <li class="nav-item" sec:authorize="isAuthenticated()">
                            <span class="nav-link text-light">
                                <span sec:authentication="name">User</span>
                            </span>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-link nav-link" style="text-decoration: none;">Logout</button>
                        </form>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
</div>
</body>
</html>
