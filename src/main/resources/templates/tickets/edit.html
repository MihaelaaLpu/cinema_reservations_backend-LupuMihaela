<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Edit Ticket</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/tickets/{id}(id=${ticket.id})}" th:object="${ticket}" method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label d-block">Ticket Type *</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" th:field="*{ticketType}" value="CHILD" id="typeChild" required>
                                <label class="form-check-label" for="typeChild">CHILD</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" th:field="*{ticketType}" value="ADULT" id="typeAdult" required>
                                <label class="form-check-label" for="typeAdult">ADULT</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" th:field="*{ticketType}" value="SENIOR" id="typeSenior" required>
                                <label class="form-check-label" for="typeSenior">SENIOR</label>
                            </div>
                            <p class="text-danger mt-1" th:if="${#fields.hasErrors('ticketType')}" th:errors="*{ticketType}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Screening *</label>
                            <select class="form-select" th:field="*{screening.id}" required>
                                <option th:each="s : ${screenings}"
                                        th:value="${s.id}"
                                        th:text="${#temporals.format(s.startTime, 'dd-MM-yyyy HH:mm')} + ' | ' + ${s.movie.title} + ' | Room: ' + ${s.cinemaRoom.roomCode}">
                                </option>
                            </select>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Seat Row *</label>
                                <input type="text" class="form-control" th:field="*{seatRow}" required>
                            </div>
                            <div class="col">
                                <label class="form-label">Seat Number *</label>
                                <input type="number" class="form-control" th:field="*{seatNumber}" required min="1">
                                <p class="text-danger mt-1" th:if="${#fields.hasErrors('seatNumber')}" th:errors="*{seatNumber}"></p>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/tickets}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
